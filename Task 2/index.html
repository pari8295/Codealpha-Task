<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .chat-container {
            width: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
        }

        .user {
            text-align: right;
            margin: 10px 0;
        }

        .bot {
            text-align: left;
            margin: 10px 0;
        }

        .message {
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user .message {
            background: #007bff;
            color: white;
        }

        .bot .message {
            background: #e9ecef;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin-left: 5px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">FAQ Chatbot</div>

    <div class="chat-box" id="chatBox">
        <div class="bot">
            <span class="message">Hello! Ask me a question.</span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const faqs = [
       
        {
            question: "return policy",
            answer: "You can return products within 30 days of purchase."
        },
        {
            question: "track order",
            answer: "You can track your order using the tracking link sent to your email."
        },
        {
            question: "international shipping",
            answer: "Yes, we ship to most countries worldwide."
        },
        {
            question: "customer support",
            answer: "You can contact support via email or phone."
        },
        {
            question: "payment methods",
            answer: "We accept credit cards, debit cards, and PayPal."
        }
    ];

    function findBestAnswer(userQuestion) {
        userQuestion = userQuestion.toLowerCase();

        let bestAnswer = "Sorry, I couldn't find a relevant answer.";

        for (let faq of faqs) {
            if (userQuestion.includes(faq.question)) {
                bestAnswer = faq.answer;
                break;
            }
        }

        return bestAnswer;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");

        const question = input.value.trim();

        if (question === "") return;

        chatBox.innerHTML += `
            <div class="user">
                <span class="message">${question}</span>
            </div>
        `;

        const answer = findBestAnswer(question);

        chatBox.innerHTML += `
            <div class="bot">
                <span class="message">${answer}</span>
            </div>
        `;

        input.value = "";

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("userInput")
        .addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
</script>

</body>
</html>
